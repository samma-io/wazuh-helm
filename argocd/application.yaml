apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wazuh
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:samma-io/wazuh-helm.git
    targetRevision: HEAD
    path: chart
    helm:
      values: |
        wazuh:
          tag: "4.14.0"

        nodeSelector:
          kubernetes.io/arch: amd64

        credentials:
          indexer:
            username: admin
            password: admin
          api:
            username: wazuh-wui
            password: "MyS3cr37P450r.*-"
          dashboard:
            username: kibanaserver
            password: kibanaserver
          agentRegistration: "CUSTOM_PASSWORD"
          clusterKey: "c98b6ha9b6169zc5f67rae55ae4z5647"

        certs:
          duration: "2160h"
          renewBefore: "360h"

        persistence:
          storageClass: ""
          master:
            size: 50Gi
            accessMode: ReadWriteOnce
          worker:
            size: 50Gi
            accessMode: ReadWriteOnce
          indexer:
            size: 50Gi
            accessMode: ReadWriteOnce
          dashboard:
            size: 5Gi
            accessMode: ReadWriteOnce

        resources:
          manager:
            requests:
              cpu: 200m
              memory: 1024Mi
            limits:
              cpu: 500m
              memory: 2048Mi
          indexer:
            requests:
              cpu: 200m
              memory: 1024Mi
            limits:
              cpu: 500m
              memory: 2048Mi
            javaOpts: "-Xms1g -Xmx1g"
          dashboard:
            requests: {}
            limits: {}

        dashboard:
          serviceType: ClusterIP

        ingestAgent:
          image: ghcr.io/samma-io/wazuh-agent
          tag: "main"
          replicas: 3
          group: "default"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          hpa:
            minReplicas: 3
            maxReplicas: 10
            targetCPUUtilizationPercentage: 70

        keycloak:
          enabled: true
          tag: "23.0.6"
          path: "/login"
          realm: wazuh
          clientSecret: "2nZSzY93xS4fVjycngVfcYDp0nKdnFao"
          admin:
            username: admin
            password: "Admin1234!"
          db:
            name: keycloak
            username: keycloak
            password: "Keycloak1234!"
            storageSize: 10Gi
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

        ingress:
          enabled: true
          ingressClassName: traefik
          host: wazuh.samma.io
          issuerKind: "ClusterIssuer"
          clusterIssuer: "http"
          tlsSecretName: wazuh-dashboard-ingress-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: wazuh
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
