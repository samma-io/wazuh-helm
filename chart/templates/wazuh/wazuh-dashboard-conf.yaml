apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-dashboard-conf
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
data:
  opensearch_dashboards.yml: |-
      server.host: 0.0.0.0
      server.port: 5601
      opensearch.hosts: https://wazuh-indexer.{{ .Release.Namespace }}.svc:9200
      opensearch.ssl.verificationMode: certificate
      opensearch.requestHeadersWhitelist: ["securitytenant","Authorization"]
      opensearch_security.multitenancy.enabled: false
      opensearch_security.readonly_mode.roles: ["kibana_read_only"]
      server.ssl.enabled: true
      server.ssl.key: "/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem"
      server.ssl.certificate: "/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem"
      opensearch.ssl.certificateAuthorities: ["/usr/share/wazuh-dashboard/certs/root-ca.pem"]
      uiSettings.overrides.defaultRoute: /app/wz-home
      {{- if .Values.keycloak.enabled }}
      opensearch_security.auth.type: "openid"
      opensearch_security.openid.connect_url: "http://keycloak.{{ .Release.Namespace }}.svc{{ .Values.keycloak.path }}/realms/{{ .Values.keycloak.realm }}/.well-known/openid-configuration"
      opensearch_security.openid.client_id: "wazuh"
      opensearch_security.openid.client_secret: {{ .Values.keycloak.clientSecret | quote }}
      opensearch_security.openid.scope: "openid profile email"
      opensearch_security.openid.base_redirect_url: "https://{{ .Values.ingress.host }}"
      opensearch_security.openid.logout_url: "https://{{ .Values.ingress.host }}{{ .Values.keycloak.path }}/realms/{{ .Values.keycloak.realm }}/protocol/openid-connect/logout"
      {{- end }}
  wazuh.yml: |-
      hosts:
      - 1513629884013:
          url: "https://wazuh-manager.{{ .Release.Namespace }}.svc"
          port: 55000
          username: {{ .Values.credentials.api.username }}
          password: {{ .Values.credentials.api.password | quote }}
          run_as: false
