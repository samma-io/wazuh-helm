apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager-master
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-manager
      node-type: master
  serviceName: wazuh-cluster
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: wazuh-manager
        node-type: master
      name: wazuh-manager-master
    spec:
      initContainers:
      - name: volume-mount-hack
        image: wazuh/wazuh-manager:{{ .Values.wazuh.tag }}
        command: ["/bin/sh", "-c"]
        args:
          - chown -R wazuh:wazuh /var/ossec/;
            mkdir -p /var/ossec/etc/shared/;
            echo "#clean" > /var/ossec/etc/shared/ar.conf;
        volumeMounts:
        - name: wazuh-manager-master
          mountPath: /var/ossec/
        - name: wazuh-alerts
          mountPath: /var/ossec/logs/alerts/
      containers:
        - name: wazuh-manager
          image: wazuh/wazuh-manager:{{ .Values.wazuh.tag }}
          env:
            - name: INDEXER_URL
              value: https://wazuh-indexer.{{ .Release.Namespace }}.svc:9200
            - name: INDEXER_USERNAME
              value: {{ .Values.credentials.indexer.username | quote }}
            - name: INDEXER_PASSWORD
              value: {{ .Values.credentials.indexer.password | quote }}
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: full
            - name: SSL_CERTIFICATE_AUTHORITIES
              value: /etc/ssl/root-ca.pem
            - name: SSL_CERTIFICATE
              value: /etc/ssl/filebeat.pem
            - name: SSL_KEY
              value: /etc/ssl/filebeat.key
            - name: API_USERNAME
              value: {{ .Values.credentials.api.username | quote }}
            - name: API_PASSWORD
              value: {{ .Values.credentials.api.password | quote }}
          resources:
            {{- toYaml .Values.resources.manager | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: ossec.conf
              readOnly: true
            - name: wazuh-register-key
              mountPath: /var/ossec/etc/authd.pass
              subPath: authd.pass
              readOnly: true
            - name: wazuh-manager-master
              subPath: api/configuration
              mountPath: /var/ossec/api/configuration
            - name: wazuh-manager-master
              subPath: etc
              mountPath: /var/ossec/etc
            - name: wazuh-manager-master
              subPath: logs
              mountPath: /var/ossec/logs
            - name: wazuh-alerts
              mountPath: /var/ossec/logs/alerts/
            - name: wazuh-manager-master
              subPath: queue
              mountPath: /var/ossec/queue
            - name: wazuh-manager-master
              subPath: multigroups
              mountPath: /var/ossec/multigroups
            - name: wazuh-manager-master
              subPath: integrations
              mountPath: /var/ossec/integrations
            - name: wazuh-manager-master
              subPath: active-response/bin
              mountPath: /var/ossec/active-response/bin
            - name: wazuh-manager-master
              subPath: agentless
              mountPath: /var/ossec/agentless
            - name: wazuh-manager-master
              subPath: wodles
              mountPath: /var/ossec/wodles
            - name: wazuh-filebeat
              subPath: etc
              mountPath: /var/ossec/data_tmp/permanent/etc/filebeat
            - name: wazuh-filebeat
              subPath: var
              mountPath: /var/lib/filebeat
            - name: wazuh-filebeat-conf
              mountPath: /var/ossec/data_tmp/permanent/etc/filebeat/filebeat.yml
              subPath: filebeat.yml
              readOnly: true
            - name: wazuh-manager
              mountPath: /etc/ssl/filebeat.key
              subPath: tls.key
              readOnly: true
            - name: wazuh-manager
              mountPath: /etc/ssl/filebeat.pem
              subPath: tls.crt
              readOnly: true
            - name: wazuh-root
              mountPath: /etc/ssl/root-ca.pem
              subPath: ca.crt
              readOnly: true
          ports:
            - containerPort: 1515
              name: registration
            - containerPort: 1516
              name: cluster
            - containerPort: 55000
              name: api
      {{- include "wazuh.nodeSelector" . | nindent 6 }}
      volumes:
      - name: wazuh-manager-master
        persistentVolumeClaim:
          claimName: wazuh-manager-master
      - name: wazuh-filebeat
        persistentVolumeClaim:
          claimName: wazuh-manager-filebeat
      - name: config
        configMap:
          name: wazuh-manager-master-conf
      - name: wazuh-register-key
        configMap:
          name: wazuh-register-key
      - name: wazuh-manager
        secret:
          secretName: wazuh-manager
      - name: wazuh-root
        secret:
          secretName: wazuh-rootca-certificate
      - name: wazuh-filebeat-conf
        configMap:
          name: wazuh-filebeat-conf
      - name: wazuh-alerts
        emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wazuh-manager-master
  namespace: {{ .Release.Namespace }}
  labels:
    app: wazuh-manager-master
spec:
  {{- include "wazuh.pvcSpec" (dict "component" .Values.persistence.master "storageClass" .Values.persistence.storageClass) | nindent 2 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wazuh-manager-filebeat
  namespace: {{ .Release.Namespace }}
  labels:
    app: wazuh-manager-master
spec:
  {{- include "wazuh.pvcSpec" (dict "component" .Values.persistence.masterFilebeat "storageClass" .Values.persistence.storageClass) | nindent 2 }}
