apiVersion: v1
kind: Service
metadata:
  name: wazuh-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app: wazuh-dashboard
    node-type: dashboard
spec:
  type: {{ .Values.dashboard.serviceType | default "ClusterIP" }}
  selector:
    app: wazuh-dashboard
    node-type: dashboard
  ports:
    - name: kibana
      port: 5601
      targetPort: 5601
