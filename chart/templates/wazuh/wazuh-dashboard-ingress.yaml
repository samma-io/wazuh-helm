{{- if .Values.ingress.enabled }}
# Provision the TLS certificate via cert-manager
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wazuh-dashboard-ingress-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tlsSecretName }}
  dnsNames:
    - {{ .Values.ingress.host | quote }}
  issuerRef:
    name: {{ .Values.ingress.clusterIssuer }}
    kind: {{ .Values.ingress.issuerKind }}
---
# Traefik IngressRoute — explicitly sets scheme: https for the backend
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wazuh-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    {{- if .Values.keycloak.enabled }}
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.keycloak.path }}`)
      kind: Rule
      priority: 100
      services:
        - name: keycloak
          port: 80
    {{- end }}
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: wazuh-dashboard
          port: 5601
          scheme: https
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
{{- end }}
