apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wazuh-ingest-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wazuh-ingest-agent
  minReplicas: {{ .Values.ingestAgent.hpa.minReplicas }}
  maxReplicas: {{ .Values.ingestAgent.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.ingestAgent.hpa.targetCPUUtilizationPercentage }}
