apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-filebeat-conf
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
data:
  filebeat.yml: |-
    # Wazuh - Filebeat configuration file
    filebeat.modules:
      - module: wazuh
        alerts:
          enabled: true
        archives:
          enabled: false

    setup.template.json.enabled: true
    setup.template.overwrite: true
    setup.template.json.path: '/var/ossec/data_tmp/permanent/etc/filebeat/wazuh-template.json'
    setup.template.json.name: 'wazuh'
    setup.ilm.enabled: false
    output.elasticsearch:
      hosts: ['https://wazuh-indexer.{{ .Release.Namespace }}.svc:9200']
      username: '{{ .Values.credentials.indexer.username }}'
      password: '{{ .Values.credentials.indexer.password }}'
      ssl.verification_mode: '{{ .Values.filebeat.sslVerificationMode }}'
      ssl.certificate_authorities: ['/etc/ssl/root-ca.pem']
      ssl.certificate: '/etc/ssl/filebeat.pem'
      ssl.key: '/etc/ssl/filebeat.key'

    logging.metrics.enabled: false

    seccomp:
      default_action: allow
      syscalls:
      - action: allow
        names:
        - rseq
